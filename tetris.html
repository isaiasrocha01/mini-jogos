<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧱 Pet Tetris</title>

    <link rel="stylesheet" href="tetris.css">
</head>

<body>

<div class="screen active">

    <h1>🧱 Pet Tetris</h1>

    <div id="main-container">

        <!-- Área do jogo -->
        <div id="game-container">

            <div id="ui">

                <div class="stats">

                    <div class="stat-box">
                        Pontos<br>
                        <span id="score" class="value">0</span>
                    </div>

                    <div class="stat-box">
                        Nível<br>
                        <span id="level" class="value">1</span>
                    </div>

                    <div class="stat-box">
                        Linhas<br>
                        <span id="lines" class="value">0</span>
                    </div>

                </div>

            </div>

            <div class="game-area">

                <!-- Canvas principal -->
                <canvas
                    id="tetris"
                    width="300"
                    height="600">
                </canvas>

                <!-- Painel lateral -->
                <div class="side-panel">

                    <div class="panel-box">

                        <h3>Próxima</h3>

                        <canvas
                            id="next"
                            width="120"
                            height="120">
                        </canvas>

                    </div>

                    <div class="panel-box">

                        <h3>Controles</h3>

                        <p>⬅️ ➡️ Mover</p>
                        <p>⬇️ Descer</p>
                        <p>⬆️ Girar</p>
                        <p>Espaço = Queda</p>

                    </div>

                </div>

            </div>

            <div class="instructions">

                Complete linhas para ganhar pontos!

            </div>

            <div class="buttons">

                <button
                    id="restartBtn"
                    class="btn-back">

                    🔄 Reiniciar

                </button>

                <a
                    href="index.html"
                    class="btn-back">

                    ↩ Voltar ao Menu

                </a>

            </div>

        </div>

        <!-- Ranking -->

        <div id="leaderboard-panel">

            <h2>🏆 TOP PETS</h2>

            <ol id="leaderboard-list"></ol>

        </div>

    </div>

</div>

<script src="tetris.js"></script>

</body>

</html>
