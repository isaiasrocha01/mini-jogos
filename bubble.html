<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Bubble Pop 🔮</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="screen active">
        <h1>🔮 Pet Bubble Pop</h1>
        <div id="main-container">
            <div id="game-container">
                <div id="ui">
                    <div class="stats">
                        <div class="stat-box">Pontos: <span id="score" class="value">0</span></div>
                        <div class="preview-container">
                            <span>Próximo Brinquedo:</span>
                            <div id="next-bubble-preview" class="preview-ball"></div>
                        </div>
                    </div>
                </div>
                <canvas id="game" width="440" height="480"></canvas>
                <div class="instructions">[Espaço] ou [Botão Direito] troca o brinquedo • Mire com o mouse</div>
                <a href="index.html" class="btn-back">↩ Voltar ao Menu</a>
            </div>
            <div id="leaderboard-panel">
                <h2>🏆 TOP PETS</h2>
                <ol id="leaderboard-list"></ol>
            </div>
        </div>
    </div>

    <script src="game.js"></script>
    <script>
        // Inicializa especificamente o jogo Bubble nesta página
        window.onload = () => { initBubbleGame(); };
    </script>
</body>
</html>
